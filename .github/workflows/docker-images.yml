name: Build and Push Docker Images

on:
  push:
    branches: [master]
  release:
    types: [published]

env:
  FRONTEND_DEV_REPO: cbioportal/cbioportal-frontend-dev
  FRONTEND_PROD_REPO: cbioportal/cbioportal-frontend
  E2E_RUNNER_REPO: cbioportal/e2e-runner

jobs:
  build-frontend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set tags
        id: tags
        run: |
          SHA=${{ github.sha }}
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${{ github.event.release.tag_name }}
            echo "tags=${{ env.FRONTEND_PROD_REPO }}:${VERSION},${{ env.FRONTEND_PROD_REPO }}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.FRONTEND_DEV_REPO }}:${SHA},${{ env.FRONTEND_DEV_REPO }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-e2e-runner-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push e2e runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: end-to-end-test/Dockerfile.e2e-runner
          push: true
          tags: |
            ${{ env.E2E_RUNNER_REPO }}:${{ github.sha }}
            ${{ env.E2E_RUNNER_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
