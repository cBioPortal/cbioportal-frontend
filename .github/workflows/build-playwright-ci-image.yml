# Build and publish the custom Playwright CI Docker image to GHCR.
#
# The image pre-bakes jq, corepack (pnpm shim), and http-server@0.11.1 so that
# playwright_e2e_shards CircleCI jobs don't need apt-get or npm at runtime.
#
# Image: ghcr.io/cbioportal/cbioportal-frontend-playwright-ci:v1.59.1-jammy
#
# Triggers:
#   • Push to master that touches the Dockerfile
#   • Manual workflow_dispatch (for rebuilds without a Dockerfile change)

name: Build Playwright CI image

on:
  push:
    branches:
      - master
    paths:
      - .circleci/images/playwright/Dockerfile
  workflow_dispatch:

jobs:
  build-and-push:
    # Only run on the main repo (not forks) to keep GHCR credentials safe.
    if: github.repository == 'cBioPortal/cbioportal-frontend'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .circleci/images/playwright
          push: true
          tags: ghcr.io/cbioportal/cbioportal-frontend-playwright-ci:v1.59.1-jammy
          cache-from: type=gha
          cache-to: type=gha,mode=max
