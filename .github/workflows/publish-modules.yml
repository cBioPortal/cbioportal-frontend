# Publish modules under packages directory to npm registry
name: cBioPortal Frontend Module Publish

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish:
    # Only run on push events triggered by the Lerna Publish Bot, or when manually dispatched
    if: github.event_name == 'workflow_dispatch' || github.actor == 'cbioportal-devops'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # `publishModulesFromPackages` publishes from package versions, not git tags.
      # Keep fetching tags only as a compatibility measure for any downstream tooling that may inspect them.
      - run: git fetch origin +refs/tags/*:refs/tags/*
      - uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          registry-url: 'https://registry.npmjs.org'
      - run: corepack enable
      - run: yarn --frozen-lockfile
      - run: yarn buildModules
      - run: yarn publishModulesFromPackages
        env:
          NPM_CONFIG_PROVENANCE: 'true'
