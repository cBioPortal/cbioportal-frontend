version: 2.1

setup: true

orbs:
  continuation: circleci/continuation@1.1.0

parameters:
  remote_spec_pattern:
    type: string
    default: "./remote/specs/**/*.spec.js"
  localdb_spec_pattern:
    type: string
    default: "./local/specs/**/*.spec.js"
  enable_remote_e2e:
    type: boolean
    default: true
  enable_localdb_e2e:
    type: boolean
    default: true
  manual_trigger_branch_env:
    type: string
    default: "master"

jobs:
  setup_pipeline:
    docker:
      - image: cimg/node:22.18.0
    steps:
      - checkout
      - run:
          name: Decide whether to include heavy CI workflows
          environment:
            CONT_REMOTE_SPEC_PATTERN: << pipeline.parameters.remote_spec_pattern >>
            CONT_LOCALDB_SPEC_PATTERN: << pipeline.parameters.localdb_spec_pattern >>
            CONT_ENABLE_REMOTE_E2E: << pipeline.parameters.enable_remote_e2e >>
            CONT_ENABLE_LOCALDB_E2E: << pipeline.parameters.enable_localdb_e2e >>
            CONT_MANUAL_TRIGGER_BRANCH_ENV: << pipeline.parameters.manual_trigger_branch_env >>
          command: |
            node scripts/ci/write-continuation-params.mjs > /tmp/continuation-params.json
            cat /tmp/continuation-params.json
      - continuation/continue:
          configuration_path: .circleci/continue_config.yml
          parameters: /tmp/continuation-params.json

workflows:
  setup:
    jobs:
      - setup_pipeline
