# cBioPortal Frontend CI Configuration
version: 2.1

parameters:
  remote_spec_pattern:
    type: string
    default: "./remote/specs/**/*.spec.js"
  localdb_spec_pattern:
    type: string
    default: "./local/specs/**/*.spec.js"
  enable_remote_e2e:
    type: boolean
    default: true
  enable_localdb_e2e:
    type: boolean
    default: true
  manual_trigger_branch_env:
    type: string
    default: "master"

defaults: &defaults
  working_directory: /tmp/repo
  docker:
    - image: cimg/node:22.18.0-browsers

jobs:
  # ─── Checkout + Build ────────────────────────────────────────
  checkout:
    machine:
      image: ubuntu-2204:2024.08.1
    resource_class: medium
    working_directory: /tmp/repo
    steps:
      - checkout:
          path: /tmp/repo/cbioportal-frontend
      - persist_to_workspace:
          root: /tmp/repo
          paths: cbioportal-frontend

  build_frontend:
    <<: *defaults
    resource_class: large
    working_directory: /tmp/repo
    environment:
      BRANCH_ENV: master
      TRANSPILE_ONLY: true
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Generate cache key for dist
          command: |
            cd cbioportal-frontend
            cat yarn.lock $(find src/ -type f | sort) $(find packages/ -type f | sort) webpack.config.js vendor-bundles.webpack.config.js > has_source_changed
      - restore_cache:
          keys:
            - v11-dependencies-plus-dist-{{ checksum "cbioportal-frontend/has_source_changed" }}
            - v11-dependencies-{{ checksum "cbioportal-frontend/yarn.lock" }}
      - run:
          name: Download dependencies
          command: |
            cd cbioportal-frontend
            (ls node_modules && ls packages/*/dist) || (yarn && yarn buildModules)
      - save_cache:
          name: Save dependency cache
          key: v11-dependencies-{{ checksum "cbioportal-frontend/yarn.lock" }}
          paths:
            - cbioportal-frontend/node_modules
      - run:
          name: Build frontend application
          environment:
            DISABLE_SOURCEMAP: true
            NO_PARALLEL: true
          command: |
            cd cbioportal-frontend
            ls dist || yarn run build
      - run:
          name: Build frontend tests
          command: |
            cd cbioportal-frontend/end-to-end-test
            ls node_modules || yarn install --frozen-lockfile --ignore-engines
      - save_cache:
          name: Save dependency plus dist cache
          key: v11-dependencies-plus-dist-{{ checksum "cbioportal-frontend/has_source_changed" }}
          paths:
            - cbioportal-frontend/node_modules
            - cbioportal-frontend/dist
            - cbioportal-frontend/common-dist
            - cbioportal-frontend/packages
      - persist_to_workspace:
          root: /tmp/repo
          paths:
            - cbioportal-frontend

  pull_cbioportal_test_codebase:
    machine:
      image: ubuntu-2204:2024.08.1
    resource_class: medium
    working_directory: /tmp/repo
    steps:
      - run:
          name: Checkout cbioportal/cbioportal-test
          environment:
            TEST_REPO_URL: https://github.com/cbioportal/cbioportal-test
          command: git clone ${TEST_REPO_URL}
      - persist_to_workspace:
          root: /tmp/repo
          paths: cbioportal-test

  # ─── Unit Tests + Linting ────────────────────────────────────
  unit_tests_main:
    <<: *defaults
    resource_class: medium
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Run junit tests main
          environment:
            JEST_JUNIT_OUTPUT_DIR: ./junit/unit/main/
            JEST_JUNIT_OUTPUT_NAME: test-results-unit-main.xml
            NODE_OPTIONS: --max-old-space-size=4096
            DISABLE_SOURCEMAP: true
            WEBPACK_PARALLEL: false
          command: cd cbioportal-frontend && yarn run testMain
      - store_test_results:
          path: ./junit/unit/main/

  unit_tests_packages:
    <<: *defaults
    resource_class: medium
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Run jest junit tests
          environment:
            DISABLE_SOURCEMAP: true
            NODE_OPTIONS: --max-old-space-size=4096
            WEBPACK_PARALLEL: false
          command: cd cbioportal-frontend && yarn run testPackagesCI
      - store_test_results:
          path: /tmp/junit/module/

  check_forgotten_spec_only_statements:
    <<: *defaults
    resource_class: medium
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Check forgotten .only statements
          command: |
            cd cbioportal-frontend
            ! grep '\\.only' $(find ./src ./end-to-end-test -type f -name '*spec*' | grep -v node_modules) | grep -v 'doTest.only = function' | grep -v expectedParsedResult

  check_incorrect_import_statements:
    <<: *defaults
    resource_class: medium
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Check incorrect package import statements
          command: cd cbioportal-frontend && yarn run checkIncorrectImportStatements

  check_typescript:
    <<: *defaults
    resource_class: large
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Run TypeScript type checking
          command: cd cbioportal-frontend && yarn run checkTS

  prettier:
    <<: *defaults
    resource_class: medium
    environment:
      MANUAL_TRIGGER_BRANCH_ENV: << pipeline.parameters.manual_trigger_branch_env >>
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Check code style with Prettier
          command: |
            cd cbioportal-frontend
            yarn add -W prettier@1.19.1
            yarn run prettierCheckCircleCI

  api_sync_cbioportal:
    <<: *defaults
    resource_class: medium
    environment:
      MANUAL_TRIGGER_BRANCH_ENV: << pipeline.parameters.manual_trigger_branch_env >>
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Check cbioportal api responses are still the same
          command: cd cbioportal-frontend && bash src/test/check_api_sync_cbioportal.sh

  api_sync_dependencies:
    <<: *defaults
    environment:
      MANUAL_TRIGGER_BRANCH_ENV: << pipeline.parameters.manual_trigger_branch_env >>
    steps:
      - attach_workspace:
          at: /tmp/repo
      - run:
          name: Check dependency api responses are still the same
          command: cd cbioportal-frontend && bash src/test/check_api_sync_dependencies.sh

  # ─── E2E Tests (using Docker images) ────────────────────────
  e2e_localdb_tests:
    machine:
      image: ubuntu-2204:2024.08.1
    resource_class: large
    working_directory: /tmp/repo
    environment:
      DOCKER_IMAGE_CBIOPORTAL: cbioportal/cbioportal:master
      DOCKER_IMAGE_MYSQL: cbioportal/mysql:8.0-database-test
      E2E_RUNNER_IMAGE: cbioportal/e2e-runner:latest
      FRONTEND_IMAGE: cbioportal/cbioportal-frontend-dev:latest
    steps:
      - attach_workspace:
          at: /tmp/repo
      # Start backend + database
      - run:
          name: Generate keycloak config
          environment:
            STUDIES: 'ascn_test_study study_hg38 teststudy_genepanels study_es_0 lgg_ucsf_2014_test_generic_assay'
          command: |
            git clone https://github.com/cbioportal/cbioportal-docker-compose.git
            cd cbioportal-test
            ./utils/gen-keycloak-config.sh --studies="$STUDIES" \
              --template='/tmp/repo/cbioportal-docker-compose/dev/keycloak/keycloak-config.json' \
              --out='/tmp/repo/keycloak-config-generated.json'
      - run:
          name: Start backend with keycloak
          environment:
            KEYCLOAK_CONFIG_PATH: '/tmp/repo/keycloak-config-generated.json'
            APPLICATION_PROPERTIES_PATH: '/tmp/repo/cbioportal-frontend/end-to-end-test/local/runtime-config/portal.properties'
          command: |
            cd cbioportal-test
            nohup ./scripts/docker-compose.sh \
              --portal_type='keycloak' \
              --compose_extensions='-f addon/clickhouse/docker-compose.remote.clickhouse.yml' \
              >> /tmp/repo/docker-compose-logs.txt 2>&1 &
      - run:
          name: Wait for services
          command: |
            cd cbioportal-test
            ./utils/check-connection.sh --url=localhost:8081 --max_retries=50
            ./utils/check-connection.sh --url=localhost:8080 --max_retries=250
      # Run e2e tests using the runner image
      - run:
          name: Run e2e localdb tests
          command: |
            mkdir -p /tmp/repo/e2e-results
            docker run --network host --shm-size=2G \
              -e CBIOPORTAL_URL=http://localhost:8080 \
              -e SPEC_FILE_PATTERN="<< pipeline.parameters.localdb_spec_pattern >>" \
              -e FRONTEND_TEST_DO_NOT_LOAD_EXTERNAL_FRONTEND=true \
              -v /tmp/repo/e2e-results:/tests/local/junit \
              -v /tmp/repo/cbioportal-frontend/end-to-end-test/local/screenshots:/tests/local/screenshots \
              ${E2E_RUNNER_IMAGE} || true
      - run:
          name: Make sure all screenshots are tracked
          command: |
            cd cbioportal-frontend
            for f in end-to-end-test/local/screenshots/reference/*.png; do
              git ls-files --error-unmatch $f > /dev/null 2> /dev/null ||
              (echo -e "\033[0;31m $f not tracked \033[0m" && touch screenshots_not_tracked);
            done
            ls screenshots_not_tracked > /dev/null 2> /dev/null && exit 1 || exit 0
      - store_artifacts:
          path: /tmp/repo/docker-compose-logs.txt
      - store_artifacts:
          path: /tmp/repo/cbioportal-frontend/end-to-end-test/local/screenshots
          destination: /screenshots
      - store_artifacts:
          path: /tmp/repo/cbioportal-frontend/end-to-end-test/shared/image-compare
          destination: /image-compare
      - store_test_results:
          path: /tmp/repo/e2e-results
      - store_artifacts:
          path: /tmp/repo/e2e-results
      - store_artifacts:
          path: /tmp/repo/cbioportal-frontend/end-to-end-test/shared/imageCompare.html
          destination: /imageCompare.html

  e2e_tests:
    machine:
      image: ubuntu-2204:2024.08.1
    resource_class: large
    working_directory: /tmp/repo
    environment:
      E2E_RUNNER_IMAGE: cbioportal/e2e-runner:latest
      CBIOPORTAL_URL: https://www.cbioportal.org
    steps:
      - attach_workspace:
          at: /tmp/repo
      - when:
          condition: << pipeline.parameters.enable_remote_e2e >>
          steps:
            - run:
                name: Check remote cbioportal connection
                command: |
                  cd cbioportal-test
                  sh ./utils/check-connection.sh --url=$CBIOPORTAL_URL
            - run:
                name: Run e2e remote tests
                command: |
                  mkdir -p /tmp/repo/e2e-results
                  docker run --network host --shm-size=2G \
                    -e CBIOPORTAL_URL=${CBIOPORTAL_URL} \
                    -e SPEC_FILE_PATTERN="<< pipeline.parameters.remote_spec_pattern >>" \
                    -v /tmp/repo/e2e-results:/tests/remote/junit \
                    -v /tmp/repo/cbioportal-frontend/end-to-end-test/remote/screenshots:/tests/remote/screenshots \
                    ${E2E_RUNNER_IMAGE} || true
            - run:
                name: Make sure all screenshots are tracked
                command: |
                  cd cbioportal-frontend
                  for f in end-to-end-test/remote/screenshots/reference/*.png; do
                    git ls-files --error-unmatch $f > /dev/null 2> /dev/null ||
                    (echo -e "\033[0;31m $f not tracked \033[0m" && touch screenshots_not_tracked);
                  done
                  ls screenshots_not_tracked > /dev/null 2> /dev/null && exit 1 || exit 0
            - store_artifacts:
                path: /tmp/repo/cbioportal-frontend/end-to-end-test/remote/screenshots
                destination: /screenshots
            - store_artifacts:
                path: /tmp/repo/cbioportal-frontend/end-to-end-test/shared/image-compare
                destination: /image-compare
            - store_test_results:
                path: /tmp/repo/e2e-results
            - store_artifacts:
                path: /tmp/repo/e2e-results
            - store_artifacts:
                path: /tmp/repo/cbioportal-frontend/end-to-end-test/shared/imageCompare.html
                destination: /imageCompare.html
      - unless:
          condition: << pipeline.parameters.enable_remote_e2e >>
          steps:
            - run: echo "Job skipped via enable_remote_e2e"

workflows:
  tests:
    jobs:
      - pull_cbioportal_test_codebase
      - checkout
      - prettier:
          requires: [checkout]
          filters:
            branches:
              ignore: [master, release-*]
      - check_forgotten_spec_only_statements:
          requires: [checkout]
      - check_incorrect_import_statements:
          requires: [checkout]
      - build_frontend:
          requires: [checkout]
      - e2e_localdb_tests:
          requires: [pull_cbioportal_test_codebase, build_frontend]
      - e2e_tests:
          requires: [pull_cbioportal_test_codebase, build_frontend]
      - api_sync_cbioportal:
          requires: [build_frontend]
      - api_sync_dependencies:
          requires: [build_frontend]
      - unit_tests_packages:
          requires: [build_frontend]
      - unit_tests_main:
          requires: [build_frontend]
      - check_typescript:
          requires: [build_frontend]

  nightly:
    triggers:
      - schedule:
          cron: "0 22 * * *"
          filters:
            branches:
              only: [master]
    jobs:
      - pull_cbioportal_test_codebase
      - checkout
      - build_frontend:
          requires: [checkout]
      - e2e_localdb_tests:
          requires: [pull_cbioportal_test_codebase, build_frontend]
      - e2e_tests:
          requires: [pull_cbioportal_test_codebase, build_frontend]
      - api_sync_cbioportal:
          requires: [build_frontend]
      - api_sync_dependencies:
          requires: [build_frontend]
      - unit_tests_main:
          requires: [build_frontend]
      - unit_tests_packages:
          requires: [build_frontend]
